name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package release bundle
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: bash script/build_and_run_codex.sh release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/releases/${{ github.ref_name }}/Token Cost App - OC Codex.zip
